services:
  postgres:
    image: postgres:16
    container_name: adctor-postgres
    environment:
      POSTGRES_USER: adctor
      POSTGRES_PASSWORD: adctor
      POSTGRES_DB: adctor
    ports:
      - "5432:5432"
    volumes:
      - adctor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adctor -d adctor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adctor-postgres-data:
